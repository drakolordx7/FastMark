<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>FastMark</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <strong>FastMark</strong>
      <span id="status"></span>
    </header>
    <section id="login">
      <label>Server URL<input id="baseUrl" placeholder="https://fastmark.example.com" /></label>
      <label>Username<input id="username" /></label>
      <label>Password<input id="password" type="password" /></label>
      <button id="loginBtn">Sign in</button>
    </section>
    <section id="app" hidden>
      <div class="row">
        <button id="saveBtn">Save page</button>
        <button id="htmlBtn">Submit HTML</button>
        <button id="logoutBtn">Sign out</button>
      </div>
      <input id="search" placeholder="Search bookmarks…" />
      <ul id="results"></ul>
    </section>
    <script src="popup.js"></script>
  </body>
</html>
